<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrimp Farm Online Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        :root { --primary: #1a73e8; --danger: #d93025; --success: #28a745; }
        body { font-family: 'Kanit', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #202124; font-size: 1.5rem; margin-bottom: 5px; }
        #status-label { font-size: 0.85rem; color: #5f6368; margin-bottom: 20px; }
        
        .display-section { background: #e8f0fe; padding: 20px; border-radius: 15px; margin-bottom: 25px; }
        .temp-val { font-size: 4rem; font-weight: bold; color: var(--danger); line-height: 1; margin: 10px 0; }
        .relay-status { font-weight: bold; font-size: 1.1rem; }

        .control-section { text-align: left; border-top: 1px solid #eee; padding-top: 20px; }
        label { display: block; font-size: 0.9rem; color: #3c4043; margin-bottom: 5px; font-weight: 500; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #dadce0; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        
        button { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #1557b0; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:active { transform: scale(0.98); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <h1>ระบบควบคุมบ่อกุ้ง (Online)</h1>
    <div id="status-label">กำลังเชื่อมต่อ Server...</div>

    <div class="display-section">
        <div style="font-size: 0.9rem; color: #5f6368;">อุณหภูมิในน้ำ</div>
        <div class="temp-val"><span id="temp">--.-</span><span style="font-size: 1.5rem;">°C</span></div>
        <div class="relay-status">สถานะรีเลย์: <span id="relay">รอข้อมูล...</span></div>
    </div>

    <div class="control-section">
        <label>อุณหภูมิที่ต้องการให้เปิด (>=)</label>
        <input type="number" id="targetTemp" step="0.1" value="32.0">

        <label>เวลาเริ่มเปิดใช้งาน</label>
        <input type="time" id="startTime" value="22:00">

        <label>เวลาเริ่มปิดใช้งาน</label>
        <input type="time" id="stopTime" value="07:00">

        <button onclick="sendConfig()">บันทึกการตั้งค่าลงเครื่อง</button>
    </div>
</div>

<script>
    // --- ตั้งค่า UNIQUE TOPIC (ต้องแก้ให้ตรงกับใน ESP32) ---
    const myTopicID = "shrimp_kido_001"; // แนะนำให้เปลี่ยนชื่อนี้ให้เป็นความลับของคุณ
    const topicStatus = myTopicID + "/status";   // ESP32 ส่งมาที่นี่
    const topicControl = myTopicID + "/control"; // เว็บส่งไปที่นี่

    // --- ตั้งค่าการเชื่อมต่อ (Secure WebSocket) ---
    const broker = "broker.hivemq.com";
    const port = 8884; // พอร์ต Secure สำหรับ HTTPS
    const clientId = "web_client_" + Math.floor(Math.random() * 10000);

    const client = new Paho.MQTT.Client(broker, port, clientId);

    // เมื่อการเชื่อมต่อหลุด
    client.onConnectionLost = (responseObject) => {
        document.getElementById('status-label').innerText = "เชื่อมต่อหลุด! กำลังลองใหม่...";
        document.getElementById('status-label').style.color = "red";
        setTimeout(connect, 5000);
    };

    // เมื่อมีข้อมูลส่งมาจาก ESP32
    client.onMessageArrived = (message) => {
        console.log("Received: " + message.payloadString);
        try {
            const data = JSON.parse(message.payloadString);
            document.getElementById('temp').innerText = data.temp.toFixed(1);
            const isRelayOn = data.relay;
            const relayElem = document.getElementById('relay');
            relayElem.innerText = isRelayOn ? "ทำงาน (ON)" : "หยุด (OFF)";
            relayElem.style.color = isRelayOn ? "#28a745" : "#d93025";
        } catch (e) {
            console.error("JSON Parse Error", e);
        }
    };

    function connect() {
        const options = {
            useSSL: true, // เปิดการใช้งาน SSL เพื่อให้รันบน GitHub Pages ได้
            onSuccess: () => {
                document.getElementById('status-label').innerText = "เชื่อมต่อออนไลน์แล้ว ✅";
                document.getElementById('status-label').style.color = "green";
                client.subscribe(topicStatus);
            },
            onFailure: (err) => {
                document.getElementById('status-label').innerText = "เชื่อมต่อไม่สำเร็จ: " + err.errorMessage;
                setTimeout(connect, 5000);
            }
        };
        client.connect(options);
    }

    // ฟังก์ชันส่งค่าไปหา ESP32
    function sendConfig() {
        if (!client.isConnected()) {
            alert("ยังไม่ได้เชื่อมต่อกับ Server กรุณารอสักครู่");
            return;
        }
        const config = {
            maxT: parseFloat(document.getElementById('targetTemp').value),
            start: document.getElementById('startTime').value,
            stop: document.getElementById('stopTime').value
        };
        const message = new Paho.MQTT.Message(JSON.stringify(config));
        message.destinationName = topicControl;
        client.send(message);
        alert("ส่งข้อมูลการตั้งค่าสำเร็จ!");
    }

    // เริ่มการเชื่อมต่อ
    connect();
</script>

</body>
</html>
