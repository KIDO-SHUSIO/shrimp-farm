<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrimp Farm Online Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        /* --- CSS ส่วนที่แก้ไขเพื่อความสวยงาม --- */
        :root {
            --primary: #3498db;     /* สีน้ำเงินฟ้า Modern */
            --danger: #e74c3c;      /* สีแดง Soft */
            --success: #2ecc71;     /* สีเขียว Soft */
            --bg-body: #f4f7f6;     /* สีพื้นหลังนุ่มนวล */
            --bg-card: #ffffff;     /* สีพื้นหลัง Card */
            --text-main: #2c3e50;  /* สีตัวอักษรหลัก */
            --text-sub: #7f8c8d;   /* สีตัวอักษรรอง */
            --shadow: 0 10px 25px rgba(0,0,0,0.05); /* เงาบางๆ */
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: var(--bg-body);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center; /* จัดกึ่งกลางแนวตั้งด้วย */
            min-height: 100vh;   /* เต็มความสูงหน้าจอ */
        }

        .card {
            background: var(--bg-card);
            width: 100%;
            max-width: 420px;       /* ปรับขนาดเล็กน้อย */
            padding: 30px;          /* เพิ่ม padding */
            border-radius: 24px;    /* โค้งมนมากขึ้น */
            box-shadow: var(--shadow);
            transition: transform 0.3s ease; /* เพิ่มเอฟเฟกต์เมื่อ Hover */
        }

        .card:hover {
            transform: translateY(-5px); /* ยกลอยเล็กน้อย */
        }

        h1 {
            color: var(--text-main);
            font-size: 1.6rem;
            margin-top: 0;
            margin-bottom: 8px;
            font-weight: 500;
            text-align: center; /* จัดกึ่งกลางหัวข้อ */
        }

        #status-label {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-bottom: 25px;
            text-align: center; /* จัดกึ่งกลางสถานะ */
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px; /* เว้นระยะห่างไอคอน (ถ้ามี) */
        }

        /* ส่วนแสดงผล (Display) */
        .display-section {
            background: #eaf2f8; /* สีฟ้าอ่อนนุ่ม */
            padding: 25px;
            border-radius: 18px;
            margin-bottom: 25px;
            text-align: center; /* จัดกึ่งกลาง */
            border: 1px solid #d6eaf8; /* เส้นขอบบางๆ */
        }

        .display-title {
            font-size: 0.95rem;
            color: var(--text-sub);
            text-transform: uppercase; /* ตัวพิมพ์ใหญ่ */
            letter-spacing: 1px;       /* เว้นระยะตัวอักษร */
            margin-bottom: 5px;
        }

        .temp-val {
            font-size: 4.5rem; /* ใหญ่โดดเด่น */
            font-weight: 500;   /* ลดความหนาเล็กน้อย */
            color: var(--danger);
            line-height: 1;
            margin: 15px 0;
            display: flex;
            justify-content: center;
            align-items: baseline;
        }

        .temp-unit {
            font-size: 1.8rem;
            margin-left: 5px;
            font-weight: 300;
            color: var(--text-sub);
        }

        .relay-status {
            font-weight: 500;
            font-size: 1.1rem;
            margin-top: 10px;
            background: rgba(255,255,255,0.7); /* พื้นหลังจางๆ */
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block; /* ให้พื้นหลังพอดีตัวอักษร */
        }

        /* ส่วนควบคุม (Control) */
        .control-section {
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 25px;
        }

        .control-group {
            margin-bottom: 18px; /* จัดกลุ่ม input */
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-main);
            margin-bottom: 8px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px; /* เพิ่มพื้นที่ */
            border: 1px solid #dcdde1;
            border-radius: 12px;   /* โค้งมน */
            font-size: 1rem;
            box-sizing: border-box;
            background: #fcfcfc;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: 'Kanit', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: var(--primary); /* เปลี่ยนสีเมื่อ Focus */
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15); /* แสงเรือง */
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3); /* เงาของปุ่ม */
            font-family: 'Kanit', sans-serif;
            margin-top: 10px;
        }

        button:hover {
            background: #2980b9;
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 10px rgba(52, 152, 219, 0.3);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <h1>ระบบควบคุมบ่อกุ้ง</h1>
    <div id="status-label"><span>⏳</span> กำลังเชื่อมต่อ Server...</div>

    <div class="display-section">
        <div class="display-title">อุณหภูมิในน้ำ</div>
        <div class="temp-val">
            <span id="temp">--.-</span>
            <span class="temp-unit">°C</span>
        </div>
        <div class="relay-status">สถานะรีเลย์: <span id="relay">รอข้อมูล...</span></div>
    </div>

    <div class="control-section">
        <div class="control-group">
            <label for="targetTemp">อุณหภูมิที่ต้องการให้เปิด (>=)</label>
            <input type="number" id="targetTemp" step="0.1" value="32.0" placeholder="เช่น 32.0">
        </div>

        <div class="control-group">
            <label for="startTime">เวลาเริ่มเปิดใช้งาน</label>
            <input type="time" id="startTime" value="22:00">
        </div>

        <div class="control-group">
            <label for="stopTime">เวลาเริ่มปิดใช้งาน</label>
            <input type="time" id="stopTime" value="07:00">
        </div>

        <button onclick="sendConfig()">บันทึกการตั้งค่าลงเครื่อง</button>
    </div>
</div>

<script>
    // --- ตั้งค่า UNIQUE TOPIC (ต้องแก้ให้ตรงกับใน ESP32) ---
    const myTopicID = "shrimp_kido_001"; // แนะนำให้เปลี่ยนชื่อนี้ให้เป็นความลับของคุณ
    const topicStatus = myTopicID + "/status";   // ESP32 ส่งมาที่นี่
    const topicControl = myTopicID + "/control"; // เว็บส่งไปที่นี่

    // --- ตั้งค่าการเชื่อมต่อ (Secure WebSocket) ---
    const broker = "broker.hivemq.com";
    const port = 8884; // พอร์ต Secure สำหรับ HTTPS
    const clientId = "web_client_" + Math.floor(Math.random() * 10000);

    const client = new Paho.MQTT.Client(broker, port, clientId);

    // เมื่อการเชื่อมต่อหลุด
    client.onConnectionLost = (responseObject) => {
        const statusLabel = document.getElementById('status-label');
        statusLabel.innerHTML = "<span>⚠️</span> เชื่อมต่อหลุด! กำลังลองใหม่...";
        statusLabel.style.color = "#e74c3c";
        setTimeout(connect, 5000);
    };

    // เมื่อมีข้อมูลส่งมาจาก ESP32
    client.onMessageArrived = (message) => {
        console.log("Received: " + message.payloadString);
        try {
            const data = JSON.parse(message.payloadString);
            
            // แสดงอุณหภูมิ พร้อม Animation เล็กน้อย (ถ้าต้องการ)
            const tempElem = document.getElementById('temp');
            tempElem.innerText = data.temp.toFixed(1);

            const isRelayOn = data.relay;
            const relayElem = document.getElementById('relay');
            relayElem.innerText = isRelayOn ? "ทำงาน (ON)" : "หยุด (OFF)";
            relayElem.style.color = isRelayOn ? "#2ecc71" : "#e74c3c"; // ใช้สีจาก var()

        } catch (e) {
            console.error("JSON Parse Error", e);
        }
    };

    function connect() {
        const statusLabel = document.getElementById('status-label');
        statusLabel.innerHTML = "<span>⏳</span> กำลังเชื่อมต่อ Server...";
        statusLabel.style.color = "#7f8c8d";

        const options = {
            useSSL: true, 
            onSuccess: () => {
                statusLabel.innerHTML = "<span>✅</span> เชื่อมต่อออนไลน์แล้ว";
                statusLabel.style.color = "#2ecc71";
                client.subscribe(topicStatus);
            },
            onFailure: (err) => {
                statusLabel.innerHTML = "<span>❌</span> เชื่อมต่อไม่สำเร็จ: " + err.errorMessage;
                statusLabel.style.color = "#e74c3c";
                setTimeout(connect, 5000);
            }
        };
        client.connect(options);
    }

    // ฟังก์ชันส่งค่าไปหา ESP32
    function sendConfig() {
        if (!client.isConnected()) {
            alert("ยังไม่ได้เชื่อมต่อกับ Server กรุณารอสักครู่");
            return;
        }
        const config = {
            maxT: parseFloat(document.getElementById('targetTemp').value),
            start: document.getElementById('startTime').value,
            stop: document.getElementById('stopTime').value
        };
        const message = new Paho.MQTT.Message(JSON.stringify(config));
        message.destinationName = topicControl;
        client.send(message);
        
        // ใช้ Alert แบบเรียบง่าย หรือจะทำ Notification เองก็ได้
        alert("ส่งข้อมูลการตั้งค่าสำเร็จ!");
    }

    // เริ่มการเชื่อมต่อ
    connect();
</script>

</body>
</html>
